<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marino Madness 2026</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
background-color: #0a0a0f;
font-family: ‘Arial Black’, ‘Arial Bold’, Arial, sans-serif;
min-height: 100vh;
width: 100%;
}

.page {
background-color: #0a0a0f;
max-width: 480px;
margin: 0 auto;
padding: 24px 16px 32px;
min-height: 100vh;
}

.header { text-align: center; margin-bottom: 20px; }
.ball { font-size: 36px; display: block; margin-bottom: 4px; }
.title {
font-size: 38px;
font-weight: 900;
color: #ffffff;
letter-spacing: 4px;
text-transform: uppercase;
text-shadow: 0 0 28px rgba(255, 107, 0, 0.65);
line-height: 1.1;
}
.subtitle {
font-size: 11px;
font-weight: 700;
color: #FF6B00;
letter-spacing: 7px;
text-transform: uppercase;
margin-top: 4px;
}
.divider {
display: flex;
align-items: center;
gap: 10px;
margin: 12px auto;
max-width: 260px;
}
.dl { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, #FF6B00, transparent); }

/* Column headers */
.col-h {
display: grid;
grid-template-columns: 40px 1fr 58px 58px 64px;
padding: 0 12px 6px;
color: rgba(255, 255, 255, 0.35);
font-size: 9px;
font-weight: 700;
letter-spacing: 1.5px;
text-transform: uppercase;
}

.col-h span {
text-align: center;
cursor: pointer;
padding: 4px 2px;
border-radius: 4px;
transition: color 0.2s, background 0.2s;
user-select: none;
}
.col-h span.name-col { text-align: left; cursor: default; }
.col-h span:not(.name-col):hover { color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.05); }
.col-h span.active-mens   { color: #6aabff; }
.col-h span.active-womens { color: #ff8fab; }
.col-h span.active-total  { color: #FFD700; }

.sort-arrow { font-size: 8px; margin-left: 2px; opacity: 0.7; }

/* Rows */
.row {
display: grid;
grid-template-columns: 40px 1fr 58px 58px 64px;
align-items: center;
padding: 9px 12px;
background-color: #13131a;
border: 1px solid rgba(255, 255, 255, 0.08);
border-radius: 8px;
margin-bottom: 5px;
}

.row.gold   { background-color: #1e1608; border-color: rgba(255, 215, 0, 0.45); }
.row.silver { background-color: #161620; border-color: rgba(192, 192, 192, 0.35); }
.row.bronze { background-color: #1a1208; border-color: rgba(205, 127, 50, 0.4); }

.rnk {
font-size: 16px;
font-weight: 900;
color: rgba(255, 255, 255, 0.35);
text-align: center;
}
.row.gold   .rnk { color: #FFD700; }
.row.silver .rnk { color: #c0c0c0; }
.row.bronze .rnk { color: #cd7f32; }

.nm {
font-size: 14px;
font-weight: 700;
color: #ffffff;
padding-right: 6px;
}

.pts {
text-align: center;
font-size: 14px;
font-weight: 900;
color: #ffffff;
}
.pts.m { color: #6aabff; }
.pts.w { color: #ff8fab; }
.pts.t { font-size: 16px; color: #ffffff; }
.row.gold   .pts.t { color: #FFD700; }
.row.silver .pts.t { color: #dddddd; }
.row.bronze .pts.t { color: #cd7f32; }

.pts.sort-active { opacity: 1; }
.pts.sort-dim    { opacity: 0.35; }

.sort-label {
text-align: center;
font-size: 9px;
color: rgba(255,255,255,0.2);
letter-spacing: 1px;
margin-bottom: 8px;
text-transform: uppercase;
}
.sort-label span { color: #FF6B00; font-weight: 700; }

.footer {
text-align: center;
margin-top: 16px;
color: rgba(255, 255, 255, 0.25);
font-size: 9px;
letter-spacing: 2px;
text-transform: uppercase;
}
</style>

</head>
<body>
<div class="page">

  <div class="header">
    <span class="ball">🏀</span>
    <div class="title">Marino Madness</div>
    <div class="subtitle">2026 Standings</div>
    <div class="divider">
      <div class="dl"></div>
      <span style="color:#FFD700; font-size:16px;">🏆</span>
      <div class="dl"></div>
    </div>
  </div>

  <div class="sort-label">Sorted by: <span id="sort-label-text">Combined Total</span></div>

  <div class="col-h">
    <span></span>
    <span class="name-col">Name</span>
    <span id="hdr-m" onclick="sortBy('m')">Men's <span class="sort-arrow" id="arr-m"></span></span>
    <span id="hdr-w" onclick="sortBy('w')">Women's <span class="sort-arrow" id="arr-w"></span></span>
    <span id="hdr-t" onclick="sortBy('t')" class="active-total">Total <span class="sort-arrow" id="arr-t">▼</span></span>
  </div>

  <div id="board"></div>

  <div class="footer">🔵 Men's &nbsp;|&nbsp; 🩷 Women's &nbsp;|&nbsp; ⚪ Combined</div>

</div>

<script>
  const players = [
    { name: "Sarah",             m: 121, w: 122 },
    { name: "Patrick",           m: 101, w: 132 },
    { name: "Christine",         m: 113, w: 108 },
    { name: "Katie",             m: 93,  w: 125 },
    { name: "Chris",             m: 78,  w: 136 },
    { name: "Nicholas",          m: 82,  w: 128 },
    { name: "Taylor",            m: 85,  w: 123 },
    { name: "Kevin",             m: 75,  w: 127 },
    { name: "Alison",            m: 78,  w: 120 },
    { name: "Bryan",             m: 84,  w: 114 },
    { name: "Amanda",            m: 61,  w: 122 },
    { name: "Vincent",           m: 65,  w: 117 },
    { name: "Ball Iz Life Yawn", m: 83,  w: 92  },
    { name: "David",             m: 102, w: 73  },
    { name: "Connor",            m: 86,  w: 79  },
    { name: "Jonathan",          m: 53,  w: 103 },
    { name: "Laura",             m: 56,  w: 86  },
  ];

  let currentSort = 't';
  const medals    = ['🥇','🥈','🥉'];
  const podiumCls = ['gold','silver','bronze'];
  const labels    = { m: "Men's Bracket", w: "Women's Bracket", t: "Combined Total" };

  function sortBy(key) {
    currentSort = key;
    render();
  }

  function render() {
    const sorted = [...players].sort((a, b) => {
      if (currentSort === 't') return (b.m + b.w) - (a.m + a.w);
      if (currentSort === 'm') return b.m - a.m;
      if (currentSort === 'w') return b.w - a.w;
    });

    // Update header styles & arrows
    ['m','w','t'].forEach(k => {
      const hdr = document.getElementById('hdr-' + k);
      const arr = document.getElementById('arr-' + k);
      const activeClass = k === 'm' ? 'active-mens' : k === 'w' ? 'active-womens' : 'active-total';
      hdr.className = currentSort === k ? activeClass : '';
      arr.textContent = currentSort === k ? '▼' : '';
    });

    document.getElementById('sort-label-text').textContent = labels[currentSort];

    const board = document.getElementById('board');
    board.innerHTML = '';

    sorted.forEach((p, i) => {
      const t = p.m + p.w;
      const rowClass = i < 3 ? podiumCls[i] : '';
      const rnk = i < 3 ? medals[i] : (i + 1);

      // Dim non-active point columns to make the sort column pop
      const mDim = currentSort !== 'm' && currentSort !== 't' ? ' sort-dim' : '';
      const wDim = currentSort !== 'w' && currentSort !== 't' ? ' sort-dim' : '';
      const tDim = currentSort !== 't' ? ' sort-dim' : '';

      const row = document.createElement('div');
      row.className = 'row ' + rowClass;
      row.innerHTML = `
        <div class="rnk">${rnk}</div>
        <div class="nm">${p.name}</div>
        <div class="pts m${mDim}">${p.m}</div>
        <div class="pts w${wDim}">${p.w}</div>
        <div class="pts t${tDim}">${t}</div>
      `;
      board.appendChild(row);
    });
  }

  render();
</script>

</body>
</html>
